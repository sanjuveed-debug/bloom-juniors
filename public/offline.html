<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bloom Juniors — Offline</title>
    <meta name="theme-color" content="#7c3aed" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #24113f;
        background: linear-gradient(160deg, #fff7ed, #ede9fe);
      }
      main {
        max-width: 420px;
        border-radius: 28px;
        background: white;
        padding: 28px;
        box-shadow: 0 24px 70px rgba(36, 17, 63, 0.18);
      }
      h1 { margin: 0 0 12px; font-size: 28px; }
      p { margin: 0; line-height: 1.6; font-weight: 650; color: #475569; }
      a {
        display: inline-block;
        margin-top: 20px;
        border-radius: 18px;
        padding: 12px 18px;
        color: white;
        text-decoration: none;
        font-weight: 800;
        background: linear-gradient(135deg, #ff7a18, #ff2d55);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>Some lessons may still open if they were saved on this device. Connect to the internet again to sync progress.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
